services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: actas
      POSTGRES_PASSWORD: actas
      POSTGRES_DB: actas
    volumes:
      - actas_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actas -d actas"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - actas_internal

  backend:
    build: ./actas_backend
    restart: unless-stopped
    env_file:
      - ./actas_backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://actas:actas@db:5432/actas
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
      ONLYOFFICE_PUBLIC_URL: ${ONLYOFFICE_PUBLIC_URL:-http://157.137.189.178:8082}
      ONLYOFFICE_CALLBACK_BASE_URL: http://backend:4000
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "npm run migrate && npm run seed-users && npm start"]
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/ready', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - actas_internal

  onlyoffice:
    image: onlyoffice/documentserver:8.1
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
      JWT_HEADER: Authorization
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
    ports:
      - "8082:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - actas_internal

  face-service:
    build: ./actas_face_service
    restart: unless-stopped
    env_file:
      - ./actas_face_service/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://actas:actas@db:5432/actas
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4100:4100"
    networks:
      - actas_internal

  web:
    build:
      context: ./actas_fronted
      args:
        VITE_API_URL: ${PUBLIC_BACKEND_URL:-http://157.137.189.178:4000/api/v1}
        VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:80"
    networks:
      - actas_internal

networks:
  actas_internal:
    driver: bridge

volumes:
  actas_db_data:
  onlyoffice_data:
  onlyoffice_log:
  onlyoffice_lib:
  onlyoffice_db:
