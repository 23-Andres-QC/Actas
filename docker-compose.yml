services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: actas
      POSTGRES_PASSWORD: actas
      POSTGRES_DB: actas
    volumes:
      - actas_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # 5432 ya está ocupado por un Postgres nativo de Windows en esta máquina
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actas -d actas"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - actas_internal

  backend:
    build: ./actas_backend
    restart: unless-stopped
    env_file:
      - ./actas_backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://actas:actas@db:5432/actas
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "npm run migrate && npm run seed-users && npm start"]
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/ready', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - actas_internal

  face-service:
    build: ./actas_face_service
    restart: unless-stopped
    env_file:
      - ./actas_face_service/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://actas:actas@db:5432/actas
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4100:4100"
    networks:
      - actas_internal

  web:
    build: ./actas_fronted
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - actas_internal

networks:
  actas_internal:
    driver: bridge

volumes:
  actas_db_data:
