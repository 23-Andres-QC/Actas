server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    types {
        application/javascript  js mjs;
        text/css                css;
        text/html               html;
        image/svg+xml           svg;
        application/json        json;
        font/woff2              woff2;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
